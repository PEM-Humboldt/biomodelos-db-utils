notes: 
  - title: "ParÃ¡metros"
    description: | 
      `bmdbutils mongo <setup|validate|upload|models-metadata> [OPTIONS]`

      - `setup`: ConfiguraciÃ³n de base de datos de mongo
          - `--mongo-url`: URL de Mongo al que se desea conectar. Este debe incluir el nÃºmero del puerto. (Default: 192.168.11.105:27016)
          - `--mongo-db` : Nombre de la base de datos de mongo a la que se desea conectar. (Default:produccion)
          - `--mongo-username`: Nombre del usuario para acceder a la base de datos de mongo. (Default:biomodelos)
