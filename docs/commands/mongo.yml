  - title: "Consideraciones" 
    description: |
        - Se recomienda ejecutar primero el comando `validate` y posteriormente `upload`.
        - El comando `models-metadata` es una alternativa al flujo `validate` + `upload`.
        - El comando `setup` no es necesario si la configuraciÃ³n ya existe. Sus valores por defecto apuntan al servidor de producciÃ³n.
